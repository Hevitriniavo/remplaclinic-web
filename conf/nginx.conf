# /etc/nginx/sites-available/remplaclinic.fr.conf
server {
    server_name remplaclinic.fr www.remplaclinic.fr;
    root /var/www/remplaclinic.fr/public_html/public;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;

        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/remplaclinic_error.log;
    access_log /var/log/nginx/remplaclinic_access.log;
}